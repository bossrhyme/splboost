<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPL Boost — Sermaye Piyasası Sınav Hazırlık</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--gold:#c9a84c;--gold2:#e8d49a;--red:#b03030;--green:#1e6b3c;--bg:#faf8f3;--card:#fff;--bdr:#ddd8cc;--muted:#7a7060;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
nav{position:sticky;top:0;z-index:200;background:var(--ink);border-bottom:2px solid var(--gold);height:56px;display:flex;align-items:center;padding:0 20px;gap:12px}
.brand{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;cursor:pointer;flex-shrink:0}
.brand small{display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#aaa}
#bc{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#888;flex:1;overflow:hidden}
#bc .s{color:#555}
#bc .b{cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s}
#bc .b:hover{color:var(--gold)}
#bc .b.active{color:var(--gold2)}
#gs{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--gold2);flex-shrink:0}
.sc{display:none}.sc.on{display:block}
main{max-width:960px;margin:0 auto;padding:32px 16px 80px}
.hero{text-align:center;padding:40px 0 36px}
.hero h1{font-family:'Playfair Display',serif;font-size:2.4rem;line-height:1.2}
.hero p{color:var(--muted);margin-top:10px;font-size:1.05rem}
.stats{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0;margin-top:18px;background:var(--ink);border-radius:30px;display:inline-flex;padding:0 4px}
.stat{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--gold2);padding:7px 16px;white-space:nowrap}
.stat-sep{color:#444;font-size:.9rem;line-height:1}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin:24px 0 12px}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.lcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:20px 22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--gold);opacity:0;transition:opacity .2s}
.lcard:not(.locked):hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(201,168,76,.15);transform:translateY(-2px)}
.lcard:not(.locked):hover::before{opacity:1}
.lcard.locked{opacity:.55;cursor:default}
.lcard-n{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--gold);margin-bottom:6px}
.lcard-t{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.3;margin-bottom:8px}
.lcard-s{font-size:.8rem;color:var(--muted);line-height:1.6;margin-top:4px;padding-left:14px}
.lbadge{display:inline-block;margin-top:10px;font-size:.7rem;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:3px}
.lbadge.r{background:#e6f4ec;color:var(--green)}.lbadge.s{background:#f5f0e0;color:#a08020}
.back{background:none;border:1px solid var(--bdr);color:var(--muted);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:.82rem;margin-bottom:14px;transition:all .15s;font-family:'Source Sans 3',sans-serif}
.back:hover{border-color:var(--gold);color:var(--ink)}
.lh h2{font-family:'Playfair Display',serif;font-size:1.9rem;margin-bottom:4px}
.lh p{color:var(--muted)}
.tlist{display:flex;flex-direction:column;gap:8px}
.trow{background:var(--card);border:1px solid var(--bdr);border-radius:8px;display:flex;align-items:center;padding:14px 18px;cursor:pointer;transition:all .18s;gap:14px}
.trow:not(.locked):hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(201,168,76,.12)}
.trow.locked{opacity:.5;cursor:default}
.tcode{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--gold);flex-shrink:0;width:40px}
.tname{font-weight:500;font-size:.97rem;flex:1}
.tarr{color:var(--muted);font-size:.9rem}
.th h3{font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:4px}
.th p{color:var(--muted)}
.vtabs{display:flex;gap:8px;margin:20px 0 22px;flex-wrap:wrap}
.vtab{padding:8px 20px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;font-size:.88rem;font-weight:500;transition:all .18s;font-family:'Source Sans 3',sans-serif}
.vtab:hover{border-color:var(--gold)}.vtab.on{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.vp{display:none}.vp.on{display:block}
.acc{border:1px solid var(--bdr);border-radius:8px;margin-bottom:10px;overflow:hidden}
.ach{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;cursor:pointer;background:var(--card);transition:background .15s}
.ach:hover{background:#f0ece2}
.ach h3{font-family:'Playfair Display',serif;font-size:.97rem;display:inline}
.acn{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--gold);margin-right:6px}
.acaw{color:var(--gold);transition:transform .22s}
.acc.op .acaw{transform:rotate(180deg)}
.acb{display:none;padding:0 18px 16px;background:var(--card);font-size:.93rem}
.acc.op .acb{display:block}
.acb ul{padding-left:18px;margin-top:8px}.acb li{margin-bottom:6px;line-height:1.55}
.hl{background:#fffae8;border-left:3px solid var(--gold);padding:8px 12px;border-radius:0 4px 4px 0;margin:10px 0;font-size:.88rem;line-height:1.5}
.pg{height:5px;background:var(--bdr);border-radius:3px;margin-bottom:22px;overflow:hidden}
.pgf{height:100%;background:var(--gold);border-radius:3px;transition:width .3s}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:20px;margin-bottom:14px}
.qn{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--gold);margin-bottom:5px}
.qt{font-size:.97rem;font-weight:500;line-height:1.5;margin-bottom:13px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;transition:all .13s;font-size:.9rem;line-height:1.4}
.opt:not(.dis):hover{background:#f5f0e8;border-color:var(--gold)}
.opt.ok{background:#e6f4ec;border-color:var(--green);color:var(--green)}
.opt.no{background:#fdeaea;border-color:var(--red);color:var(--red)}
.opt.dis{cursor:default}.optl{font-family:'IBM Plex Mono',monospace;font-weight:500;flex-shrink:0}
.ep{display:none;margin-top:9px;padding:9px 13px;background:#fffae8;border-left:3px solid var(--gold);border-radius:0 4px 4px 0;font-size:.85rem;line-height:1.5;color:#4a3f20}
.ep.on{display:block}
.rsc{display:none;text-align:center;padding:36px 16px}.rsc.on{display:block}
.rc{width:110px;height:110px;border-radius:50%;border:3px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'IBM Plex Mono',monospace}
.rc .rb{font-size:1.9rem;color:var(--gold)}.rc .rs{font-size:.75rem;color:var(--muted)}
.rmsg{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:6px}
.rsub{color:var(--muted);margin-bottom:22px;font-size:.9rem}
.btn{padding:9px 22px;border-radius:6px;border:none;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:.9rem;font-weight:600;background:var(--gold);color:var(--ink)}
.btn:hover{background:#b8943f}
.soon{text-align:center;padding:60px 20px;color:var(--muted)}
.soon .ic{font-size:3rem;margin-bottom:14px}
.soon h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--ink);margin-bottom:6px}
</style>
</head>
<body>
<nav>
  <div class="brand" id="brandBtn">SPL Boost<small>Sınav Hazırlık</small></div>
  <div id="bc"></div>
  <div id="gs">✦ 0 / 0</div>
</nav>
<main>
  <div class="sc on" id="sc-home">
    <div class="hero">
      <h1>Sermaye Piyasası<br>Sınavlarına Hazırlık</h1>
      <p>Konu özetleri ve pratik testlerle lisans sınavlarına hazırlan</p>
      <div class="stats" id="heroStats"></div>
    </div>
    <div class="slabel">Lisans Türünü Seç</div>
    <div class="lgrid" id="lgrid"></div>
  </div>
  <div class="sc" id="sc-lic">
    <div class="lh">
      <button class="back" id="backBtn1">← Lisanslara Dön</button>
      <h2 id="licTitle"></h2><p id="licSub"></p>
    </div>
    <div class="slabel" style="margin-top:20px">Konu Başlıkları</div>
    <div class="tlist" id="tlist"></div>
  </div>
  <div class="sc" id="sc-topic">
    <div class="th">
      <h3 id="topicTitle"></h3><p id="topicSub"></p>
    </div>
    <div class="vtabs" id="vtabs"></div>
    <div id="vpanels"></div>
  </div>
</main>

se}, {"code": "3009", "name": "Muhasebe ve Finansal Raporlama", "ready": false}, {"code": "3010", "name": "Genel Ekonomi", "ready": false}, {"code": "3011", "name": "Temel Finans Matematiği ve Değerleme Yöntemleri", "ready": false}, {"code": "3012", "name": "Kurumlarda ve Sermaye Piyasasında Vergilendirme", "ready": false}]}, {"id": "turev", "titleTR": "Türev Araçlar Lisansı", "short": "Türev Araçlar", "edu": "4 yıllık", "ready": false, "topics": [{"code": "T01", "name": "Geniş Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "T02", "name": "Sermaye Piyasası Araçları 1", "ready": false}, {"code": "T03", "name": "Sermaye Piyasası Araçları 2", "ready": false}, {"code": "T04", "name": "Yatırım Kuruluşları", "ready": false}, {"code": "T05", "name": "Finansal Piyasalar", "ready": false}, {"code": "T06", "name": "Temel Finans Matematiği ve Değerleme Yöntemleri", "ready": false}, {"code": "T07", "name": "Türev Araçlar, Piyasalar ve Risk Yönetimi", "ready": false}, {"code": "T08", "name": "Kurumlarda ve Sermaye Piyasasında Vergilendirme", "ready": false}]}, {"id": "kredi", "titleTR": "Kredi Derecelendirme Lisansı", "short": "Kredi Derecelendirme", "edu": "4 yıllık", "ready": false, "topics": [{"code": "K01", "name": "Geniş Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "K02", "name": "Temel Finans Matematiği ve Değerleme Yöntemleri", "ready": false}, {"code": "K03", "name": "Ticaret Hukuku", "ready": false}, {"code": "K04", "name": "Muhasebe ve Finansal Raporlama", "ready": false}, {"code": "K05", "name": "Kredi Derecelendirmesi", "ready": false}]}, {"id": "kurumsal", "titleTR": "Kurumsal Yönetim Derecelendirme Lisansı", "short": "Kurumsal Yönetim", "edu": "4 yıllık", "ready": false, "topics": [{"code": "KY01", "name": "Geniş Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "KY02", "name": "Temel Finans Matematiği ve Değerleme Yöntemleri", "ready": false}, {"code": "KY03", "name": "Ticaret Hukuku", "ready": false}, {"code": "KY04", "name": "Muhasebe ve Finansal Raporlama", "ready": false}, {"code": "KY05", "name": "Kurumsal Yönetim", "ready": false}]}, {"id": "konut", "titleTR": "Konut Değerleme Lisansı", "short": "Konut Değerleme", "edu": "2 yıllık", "ready": false, "topics": [{"code": "KD01", "name": "Dar Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "KD02", "name": "Gayrimenkul Değerleme Esasları", "ready": false}]}, {"id": "gay", "titleTR": "Gayrimenkul Değerleme Lisansı", "short": "Gayrimenkul Değerleme", "edu": "4 yıllık", "ready": false, "topics": [{"code": "GD01", "name": "Dar Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "GD02", "name": "Gayrimenkul Değerleme Esasları", "ready": false}, {"code": "GD03", "name": "İnşaat ve Gayrimenkul Muhasebesi", "ready": false}, {"code": "GD04", "name": "Gayrimenkul Mevzuatı", "ready": false}]}, {"id": "bs", "titleTR": "Bilgi Sistemleri Bağımsız Denetim Lisansı", "short": "Bilgi Sistemleri", "edu": "4 yıllık", "ready": false, "topics": [{"code": "BS01", "name": "Dar Kapsamlı Sermaye Piyasası Mevzuatı ve Meslek Kuralları", "ready": false}, {"code": "BS02", "name": "Bilgi Sistemleri Yönetimi ve Denetimi", "ready": false}, {"code": "BS03", "name": "Bilgi Sistemleri Geliştirilmesi ve Uygulanması", "ready": false}, {"code": "BS04", "name": "Bilgi Sistemleri İşletimi", "ready": false}, {"code": "BS05", "name": "Bilgi Sistemleri Güvenliği", "ready": false}]}];
const C = {"1012": {"summary": [{"num": "01", "title": "Temel Kavramlar", "body": "<ul><li><strong>Takas:</strong> Alım-satım işleminin nakit ve menkul kıymet el değiştirmesiyle tamamlanması.</li><li><strong>Saklama:</strong> Sermaye piyasası araçlarının kaydi ortamda tutulması.</li><li><strong>Kaydileştirme:</strong> Fiziksel senetlerin elektronik kayda alınması.</li><li><strong>MKK:</strong> Merkezi Kayıt Kuruluşu.</li><li><strong>Takasbank:</strong> Borsa işlemlerinin takas ve saklamasını yürüten merkezi kuruluş; aynı zamanda MKT.</li><li><strong>MKT:</strong> Merkezi Karşı Taraf — alıcıya karşı satıcı, satıcıya karşı alıcı olarak karşı taraf riskini üstlenir.</li><li><strong>Başlangıç Teminatı:</strong> Pozisyon açılırken yatırılan teminat.</li><li><strong>Değişim Teminatı:</strong> Günlük kar/zarar farkı (mark-to-market).</li><li><strong>Garanti Fonu:</strong> Temerrüt halinde kullanılan toplu katkı havuzu.</li><li><strong>Netleştirme:</strong> İşlemleri bakiyeye düşürerek tek takasa indirgemek.</li></ul><div class='highlight'>DVP (Delivery vs Payment): Ödeme ve teslimatın eş zamanlı yapılması — anapara riskini ortadan kaldırır.</div>"}, {"num": "02", "title": "MKK — Merkezi Kayıt Kuruluşu", "body": "<ul><li><strong>Sermaye sınırları:</strong> Takasbank max %75, BİST max %50, TSPB max %10.</li><li>Üyeler: Aracı kurumlar, bankalar, portföy yönetim şirketleri, ihraçcılar.</li><li>Hesap türleri: Yatırımcı hesabı, havuz hesabı, emanet hesabı.</li><li>Kaydileştirmede fiziksel senet iptal edilir; hak sahipliği MKK sicilinden belirlenir.</li><li>Hisse senetleri üzerine MKK nezdinde rehin tesis edilebilir.</li></ul><div class='highlight'>Üyelikten çıkarma: Koşulları yitiren üyenin üyeliği SPK kararıyla sona erdirilir.</div>"}, {"num": "03", "title": "MTK / MKT Düzenlemeleri", "body": "<ul><li><strong>Üyelik türleri:</strong> Genel Takas Üyesi (kendi + müşteri) · Doğrudan Takas Üyesi (yalnızca kendi).</li><li><strong>Temerrüt kaskadı:</strong> 1) Üye teminatı → 2) Üyenin GF katkısı → 3) Takasbank skin-in-the-game → 4) Diğer üyelerin GF katkısı.</li><li>MTK açık pozisyonları piyasada kapatma yetkisine sahiptir.</li><li>Yabancı MTK için SPK onayı gereklidir.</li></ul>"}, {"num": "04", "title": "Portföy Saklama Hizmeti", "body": "<ul><li>Saklayıcı: SPK yetkili bankalar ve Takasbank.</li><li><strong>Değişim bildirimi: En az 90 gün önceden yapılmalıdır.</strong></li><li>Operasyonel bağımsızlık zorunludur.</li><li>İhlal tespitinde saklayıcı derhal SPK'ya bildirim yapar.</li><li>Alt saklayıcı kullanılsa bile sorumluluk ana saklayıcıda kalır.</li></ul>"}, {"num": "05", "title": "BİAŞ Pay Piyasası Takas ve Temerrüt", "body": "<ul><li><strong>Takas günü: T+2.</strong></li><li>Temerrüt eşiği: T+2 saat 14:00.</li><li><strong>Katsayılar:</strong> 16:46–17:30 → 1 · 17:31+ → 3.</li><li><strong>Ceza formülü:</strong> Borç × Referans Faiz × Katsayı × (Gün / 360).</li><li><strong>Mağduriyet ödemesi: Temerrüt cezasının 2/3'ü mağdur üyeye aktarılır.</strong></li></ul><div class='highlight'>Temerrütte menkul kıymet açık piyasadan alınır; fark temerrüde düşen taraftan tahsil edilir.</div>"}, {"num": "06", "title": "BAP Takas ve Temerrüt", "body": "<ul><li>BAP: DİBS ve özel tahvillerin alım-satım platformu; DVP esasıyla T+0 veya T+1 takas.</li><li><strong>Katsayılar:</strong> 16:46–17:00 → 0,25 · 17:01–17:30 → 0,50 · 17:31+ → 3.</li><li><strong>Gün bazı: BAP'ta payda 365 (Pay piyasasında 360!).</strong></li></ul><div class='highlight'>KRİTİK FARK: Pay → payda 360 · BAP → payda 365!</div>"}, {"num": "07", "title": "VİOP — Türev Araçlarda Takas", "body": "<ul><li><strong>Başlangıç teminatı:</strong> %99,50 güven, 2 günlük elde tutma.</li><li><strong>Değerleme katsayısı parametreleri:</strong> %99,90 güven, 2 iş günü likidite periyodu.</li><li><strong>TL zorunluluğu:</strong> Başlangıç teminatının en az %50'si TL; ilave işlem teminatında %30.</li><li>Fiziki teslimat sözleşmelerinde Takasbank koordine eder.</li></ul><div class='highlight'>%99,50 (başlangıç teminatı) ≠ %99,90 (değerleme katsayısı)</div>"}, {"num": "08", "title": "Teminat Yönetimi ve Garanti Fonu", "body": "<ul><li>Teminata kabul edilenler: TL, USD/EUR, DİBS, hisse senedi (iskontoyla), altın.</li><li><strong>Haircut:</strong> Fiyat/likidite riski için teminata uygulanan indirim oranı.</li><li>GF katkısı: Pozisyon büyüklüğüyle orantılı; düzenli güncellenir.</li><li><strong>Kaskad:</strong> 1) Üye teminatı → 2) GF katkısı → 3) Takasbank skin-in-the-game → 4) Diğer üyelerin GF katkısı.</li></ul><div class='highlight'>Takasbank özsermayesi garanti fonundan ÖNCE devreye girer.</div>"}], "tests": {"t1": [{"q": "MKK'nın sermaye yapısına göre, Takasbank'ın MKK'da sahip olabileceği azami pay oranı nedir?", "o": ["A) %25", "B) %50", "C) %75", "D) %100"], "a": 2, "e": "MKK Yönetmeliği'ne göre Takasbank MKK'da en fazla %75 paya sahip olabilir."}, {"q": "DVP ilkesinin temel amacı nedir?", "o": ["A) Temerrüt cezasını artırmak", "B) Ödeme ve teslimatı eş zamanlı gerçekleştirerek anapara riskini azaltmak", "C) Takas süresini uzatmak", "D) Netleştirmeyi hızlandırmak"], "a": 1, "e": "DVP ilkesi, menkul kıymet teslimatı ve nakit ödemenin eş anlı yapılmasını sağlayarak anapara riskini ortadan kaldırır."}, {"q": "MKT işlevinin piyasaya sağladığı en önemli katkı nedir?", "o": ["A) İşlem hacmini artırır", "B) Karşı taraf riskini üstlenerek sistematik riski azaltır", "C) Komisyon maliyetlerini azaltır", "D) Piyasa likiditesini sınırlar"], "a": 1, "e": "MKT, alıcıya karşı satıcı, satıcıya karşı alıcı olarak karşı taraf riskini üstlenir."}, {"q": "Netleştirme (netting) işleminin temel faydası nedir?", "o": ["A) Temerrüt cezasını artırır", "B) Takas yükümlülüklerini azaltarak likidite ihtiyacını düşürür", "C) Pozisyon limitlerini genişletir", "D) Saklama maliyetini yükseltir"], "a": 1, "e": "Netleştirme sayesinde üye, brüt yükümlülük yerine net bakiye üzerinden takas yapar."}, {"q": "Kaydileştirilmiş araçlarda hak sahibinin tespiti nasıl yapılır?", "o": ["A) Fiziksel senet ibrazıyla", "B) MKK sicil kayıtlarına göre", "C) Aracı kurum defterlerine göre", "D) Tapu sicil müdürlüğüne göre"], "a": 1, "e": "Hak sahipliği MKK'nın elektronik sicil kayıtlarından tespit edilir."}, {"q": "Aşağıdakilerden hangisi MKK üyesi olamaz?", "o": ["A) Aracı kurum", "B) Yatırım bankası", "C) Halka açık olmayan ticari işletmeler", "D) Portföy yönetim şirketi"], "a": 2, "e": "Halka açık olmayan ticari işletmeler doğrudan MKK üyesi olamaz."}, {"q": "Başlangıç teminatı ile değişim teminatı arasındaki temel fark nedir?", "o": ["A) Başlangıç teminatı nakit, değişim teminatı menkul kıymettir", "B) Başlangıç teminatı pozisyon açılışında yatırılır; değişim teminatı günlük kar/zarara göre oluşur", "C) Değişim teminatı daha yüksektir", "D) İkisi aynı anda yatırılır"], "a": 1, "e": "Başlangıç teminatı pozisyon açılırken yatırılır. Değişim teminatı günlük mark-to-market farkını yansıtır."}, {"q": "Takasbank'ın 'skin-in-the-game' uygulaması ne anlama gelir?", "o": ["A) Üyelerden komisyon tahsil etmek", "B) Kendi özsermayesinden temerrüt kaskadına katkı koymak", "C) Yalnızca garanti fonunu yönetmek", "D) Riskleri sigorta şirketine devretmek"], "a": 1, "e": "Takasbank kendi özsermayesinin bir bölümünü temerrüt durumunda sisteme sürerek sorumluluğunu paylaşır."}, {"q": "Portföy saklayıcısını değiştirmek için kaç gün önceden bildirim gerekir?", "o": ["A) 30 gün", "B) 60 gün", "C) 90 gün", "D) 120 gün"], "a": 2, "e": "Portföy Saklama Tebliği'ne göre saklayıcı değişikliğinde en az 90 gün önceden bildirim yapılmalıdır."}, {"q": "Temerrüt kaskadında Takasbank skin-in-the-game hangi sırada devreye girer?", "o": ["A) En son", "B) Üye teminatından önce", "C) Üyenin GF katkısından sonra, diğer üyelerin katkısından önce", "D) Diğer üyelerin katkısından sonra"], "a": 2, "e": "Kaskad sırası: 1) Üye teminatı → 2) Üyenin GF katkısı → 3) Takasbank skin-in-the-game → 4) Diğer üyelerin GF katkısı."}, {"q": "Garanti fonuna katkı payı nasıl belirlenir?", "o": ["A) Tüm üyelere eşit dağıtılır", "B) Pozisyon büyüklüğü ve risk profiliyle orantılı", "C) Yalnızca büyük üyelerden tahsil edilir", "D) Sabit ücret olarak belirlenir"], "a": 1, "e": "Garanti fonu katkısı üyenin taşıdığı riskle orantılıdır."}, {"q": "MTK/MKT olmak için ne gereklidir?", "o": ["A) Borsa üyeliği yeterlidir", "B) SPK'dan özel lisans alınması", "C) Hazine onayı", "D) BDDK izni"], "a": 1, "e": "MTK/MKT faaliyeti için SPK'dan özel lisans alınması zorunludur."}, {"q": "Değişim teminatının ödenmemesi durumunda ne olur?", "o": ["A) İşlem iptal edilir", "B) Borç sonraki güne devredilir", "C) Üye temerrüde düşmüş sayılır", "D) Takasbank farkı bağışlar"], "a": 2, "e": "Değişim teminatı zamanında karşılanmazsa üye temerrüde düşmüş sayılır ve prosedür başlar."}, {"q": "Alt saklayıcı kullanımında sorumluluk kime aittir?", "o": ["A) Alt saklayıcıya geçer", "B) Tamamen ortadan kalkar", "C) Ana saklayıcıda kalır", "D) SPK üstlenir"], "a": 2, "e": "Alt saklayıcı kullanılsa bile hukuki sorumluluk ana saklayıcıda kalır."}, {"q": "MKK'da 'havuz hesabı' ne amaçla kullanılır?", "o": ["A) Bireysel yatırımcıların kişisel hesapları", "B) Birden fazla müşterinin varlıklarının topluca saklanması", "C) Yabancı yatırımcılara özel hesaplar", "D) Yalnızca devlet tahvillerinin saklanması"], "a": 1, "e": "Havuz hesabı, saklayıcıların müşteri varlıklarını toplu tuttuğu hesap türüdür."}, {"q": "Kaydileştirme sürecinde fiziksel senetlerin akıbeti nedir?", "o": ["A) Merkez bankasına teslim edilir", "B) İptal edilerek imha edilir", "C) Yatırımcıda saklanır", "D) Mahkeme kasasına alınır"], "a": 1, "e": "Kaydileştirme tamamlandığında fiziksel senetler hukuki geçerliliğini yitirir ve imha edilir."}, {"q": "Aşağıdakilerden hangisi Takasbank'ın işlevleri arasında yer almaz?", "o": ["A) Merkezi takas", "B) Merkezi saklama", "C) Merkezi karşı taraf", "D) Kredi derecelendirme"], "a": 3, "e": "Takasbank; merkezi takas, saklama ve karşı taraf işlevlerini üstlenir. Derecelendirme bağımsız kuruluşlara aittir."}, {"q": "Rehin tesis edilen hisse senetleri MKK nezdinde nasıl kaydedilir?", "o": ["A) Tapu siciline şerh düşülerek", "B) Özel rehin hesabında kaydileştirilerek", "C) Aracı kurum defterleriyle", "D) Noterlik kaydıyla"], "a": 1, "e": "MKK, sermaye piyasası araçları üzerine kurulan rehinleri kendi sicil sistemi üzerinde kaydeder."}, {"q": "BİST'te Merkezi Karşı Taraf işlevi hangi kuruluş tarafından yürütülür?", "o": ["A) MKK", "B) SPK", "C) Takasbank", "D) BDDK"], "a": 2, "e": "Takasbank, Borsa İstanbul'daki tüm organize piyasalarda MKT sıfatıyla faaliyet gösterir."}, {"q": "Takasbank'ın Türkiye sermaye piyasasındaki merkezi rolü nedir?", "o": ["A) Yalnızca saklama hizmeti sunar", "B) Hem merkezi takas hem de merkezi karşı taraf işlevini yerine getirir", "C) Yalnızca repo işlemlerini yönetir", "D) Sadece yabancı yatırımcılara hizmet verir"], "a": 1, "e": "Takasbank hem MTK hem de MKT işlevlerini bünyesinde barındıran tek kuruluştur."}], "t2": [{"q": "Genel Takas Üyesi ile Doğrudan Takas Üyesi arasındaki fark nedir?", "o": ["A) Sermaye farkı", "B) Genel takas üyesi hem kendi hem müşteri adına takas yapar", "C) Doğrudan üye daha geniş yetkiye sahip", "D) İşlevsel fark yok"], "a": 1, "e": "Genel Takas Üyesi müşterileri adına takas yapabilirken, Doğrudan Takas Üyesi yalnızca kendi hesabına işlem yapar."}, {"q": "Portföy saklayıcısının temel yükümlülüğü nedir?", "o": ["A) Portföyü yönetmek", "B) Fon varlıklarını korumak, kayıt altına almak ve iç kontrol sağlamak", "C) Yatırımcılara getiri garantisi vermek", "D) Fon dağıtım kanallarını yönetmek"], "a": 1, "e": "Portföy saklayıcısı fon varlıklarını bağımsız olarak korur, kayıt tutar ve yatırım kısıtlarına uyumu denetler."}, {"q": "Portföy yöneticisi ile saklayıcı aynı finansal grupta ise ne gereklidir?", "o": ["A) Aynı birimin yönetmesi yeterlidir", "B) Operasyonel bağımsızlık şarttır", "C) SPK özel izin verir", "D) Yasal olarak yasaktır"], "a": 1, "e": "Aynı grup şirketi olsalar bile portföy yöneticisi ve saklayıcı arasında operasyonel bağımsızlık zorunludur."}, {"q": "Aşağıdakilerden hangisi portföy saklayıcısı olabilir?", "o": ["A) Herhangi bir anonim şirket", "B) Yalnızca aracı kurumlar", "C) SPK tarafından yetkilendirilmiş bankalar ve Takasbank", "D) Sigorta şirketleri"], "a": 2, "e": "Portföy saklama hizmetini yalnızca SPK tarafından yetkilendirilmiş bankalar ve Takasbank verebilir."}, {"q": "MKT üyeliğinden çıkarılma hangi durumda gerçekleşir?", "o": ["A) İşlem hacmi düşünce", "B) Sermaye yeterliliği kriterlerini kaybeden veya temerrüde düşen üye için", "C) Rakip borsa kurulduğunda", "D) Piyasa kapalı olduğunda"], "a": 1, "e": "Sermaye yeterliliği şartlarını yitiren veya temerrüt durumuna düşen üyeler sistemden çıkarılır."}, {"q": "Hangi durumda SPK'ya bildirim yapılmalıdır?", "o": ["A) Fon değeri artışında", "B) Yatırım sınırı ihlali tespit edildiğinde", "C) Saklama ücreti ödendiğinde", "D) Portföy yöneticisi değiştiğinde"], "a": 1, "e": "Yatırım sınırlarına aykırılık tespit eden saklayıcı derhal portföy yöneticisine ve SPK'ya bildirmekle yükümlüdür."}, {"q": "Temerrüt yönetiminde pozisyon kapatma yetkisi kime aittir?", "o": ["A) Borsa yönetimine", "B) SPK'ya", "C) MTK'ya (Takasbank)", "D) Hazine'ye"], "a": 2, "e": "Temerrüt halinde MTK, temerrüde düşen üyenin açık pozisyonlarını piyasada kapatma yetkisine sahiptir."}, {"q": "Yabancı MTK'lar Türkiye'de nasıl faaliyet gösterebilir?", "o": ["A) Herhangi bir izin gerekmez", "B) Yalnızca Hazine onayıyla", "C) SPK kararıyla", "D) BDDK izniyle"], "a": 2, "e": "Yabancı MTK'ların Türkiye'de faaliyet göstermesi için SPK'nın özel kararı gereklidir."}, {"q": "Stres testi sonucunda garanti fonu yetersiz kalırsa ne yapılır?", "o": ["A) İşlemler durdurulur", "B) Takasbank ek katkı talep eder ve SPK'ya raporlar", "C) Kayıp sigorta şirketine aktarılır", "D) Devlet garantisi devreye girer"], "a": 1, "e": "Garanti fonu yetersizliği saptanırsa ek katkı talep edilir ve SPK'ya raporlanır."}, {"q": "Portföy saklama ücreti nasıl tahsil edilir?", "o": ["A) Yatırımcıdan ayrıca", "B) Devlet tarafından karşılanır", "C) Fon içtüzüğünde belirlenen oran üzerinden fon varlıklarından", "D) Portföy yöneticisi öder"], "a": 2, "e": "Portföy saklama ücreti fon içtüzüğünde belirtilen oran üzerinden fon varlıklarından düzenli olarak ödenir."}, {"q": "Varlık ayrımı yükümlülüğü ne anlama gelir?", "o": ["A) Fon varlıklarını saklayıcının öz varlıklarından ayrı tutmak", "B) Farklı araçların ayrı raporlanması", "C) Yerli ve yabancı varlıkların ayrımı", "D) Muhasebe ayrımı"], "a": 0, "e": "Varlık ayrımı; fon müşterisine ait varlıkların saklayıcının kendi bilançosundan ve diğer müşteri varlıklarından ayrı tutulmasıdır."}, {"q": "Pro-rata ilkesi temerrüt yönetiminde neyi ifade eder?", "o": ["A) En büyük üyenin tüm kaybı üstlenmesi", "B) Kayıpların üyeler arasında pozisyon büyüklükleriyle orantılı dağıtılması", "C) Takasbank'ın tüm kaybı karşılaması", "D) SPK'nın hakem rolü üstlenmesi"], "a": 1, "e": "Pro-rata dağıtımda temerrüt zararları kalan üyelerin GF katkıları ile orantılı paylaştırılır."}, {"q": "MTK üyeliği için aranan temel koşul hangisidir?", "o": ["A) Borsada işlem görme", "B) Asgari sermaye yeterliliği ve operasyonel altyapı", "C) Devlet garantisi", "D) Uluslararası kredi notu"], "a": 1, "e": "MTK üyeliği için asgari özkaynak, teknik altyapı ve operasyonel kapasite koşulları aranır."}, {"q": "Bağımsızlık ilkesinin ihlali durumunda ne olabilir?", "o": ["A) Sadece uyarı gönderilir", "B) SPK lisansı iptal edilebilir ve idari para cezası uygulanabilir", "C) Yalnızca fon yöneticisi uyarılır", "D) Yatırımcılara bildirim yapılır"], "a": 1, "e": "Bağımsızlık ilkesinin ihlali ciddi bir düzenleme ihlalidir; SPK lisansı askıya alabilir veya iptal edebilir."}, {"q": "Saklayıcı nakit akışını ne zaman takip eder?", "o": ["A) Yalnızca vade sonunda", "B) Yalnızca fon kapanışında", "C) Sürekli olarak tüm fon girdi ve çıktılarını izler", "D) Yalnızca denetim dönemlerinde"], "a": 2, "e": "Portföy saklayıcısı fon adına yapılan tüm nakit giriş ve çıkışlarını sürekli izler." let cL=null, cT=null, gC=0, gT=0;

function $id(id){return document.getElementById(id);}
function showSc(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));$id('sc-'+id).classList.add('on');}

function updBC(){
  let h='';
  if(cL) h+=`<span class="s">›</span><span class="b" data-lid="${cL.id}">${cL.short}</span>`;
  if(cT) h+=`<span class="s">›</span><span class="b active">${cT.name}</span>`;
  $id('bc').innerHTML=h;
  $id('bc').querySelectorAll('.b[data-lid]').forEach(el=>{
    el.onclick=()=>goL(el.dataset.lid);
  });
}

function updGS(){$id('gs').textContent='✦ '+gC+' / '+gT;}

function goHome(){cL=null;cT=null;updBC();showSc('home');}
function goL(id){cL=L.find(l=>l.id===id);cT=null;updBC();renderLic();showSc('lic');}
function goT(lid,code){cL=L.find(l=>l.id===lid);cT=cL.topics.find(t=>t.code===code);updBC();renderTopic();showSc('topic');}

$id('brandBtn').onclick=goHome;
$id('backBtn1').onclick=goHome;

function renderHome(){
  // Build hero stats
  const totalTopics = L.reduce((s,l)=>s+l.topics.length,0);
  const stats = [
    L.length + ' Lisans Türü',
    totalTopics + ' Alt Başlık',
    'Konu Özetleri',
    'Testler'
  ];
  $id('heroStats').innerHTML = stats.map((s,i)=>
    (i>0?'<span class="stat-sep">·</span>':'')+`<span class="stat">${s}</span>`
  ).join('');

  $id('lgrid').innerHTML=L.map(l=>{
    const rc=l.topics.filter(t=>t.ready).length;
    const topicList=l.topics.map(t=>`<li>${t.name}</li>`).join('');
    return `<div class="lcard${l.ready?'':' locked'}" data-lid="${l.id}">
      <div class="lcard-n">${l.topics.length} konu</div>
      <div class="lcard-t">${l.title}</div>
      <ul class="lcard-s">${topicList}</ul>
      <div class="lbadge ${l.ready?'r':'s'}">${l.ready?rc+' konu hazır':'Yakında'}</div>
    </div>`;
  }).join('');
  $id('lgrid').querySelectorAll('.lcard:not(.locked)').forEach(el=>{
    el.onclick=()=>goL(el.dataset.lid);
  });
}

function renderLic(){
  $id('licTitle').textContent=cL.title;
  $id('licSub').textContent=cL.topics.length+' sınav konusu · '+cL.edu+' yükseköğretim';
  $id('tlist').innerHTML=cL.topics.map(t=>{
    return `<div class="trow${t.ready?'':' locked'}" data-tc="${t.code}">
      <span class="tcode">${t.code}</span>
      <span class="tname">${t.name}</span>
      <span class="tarr">${t.ready?'›':'<small style=\"color:#bbb\">Yakında</small>'}</span>
    </div>`;
  }).join('');
  $id('tlist').querySelectorAll('.trow:not(.locked)').forEach(el=>{
    el.onclick=()=>goT(cL.id,el.dataset.tc);
  });
}

function renderTopic(){
  $id('topicTitle').textContent=cT.name;
  $id('topicSub').textContent='Ders kodu: '+cT.code;
  const con=C[cT.code];
  const tabs=$id('vtabs');
  const panels=$id('vpanels');
  if(!con){
    tabs.innerHTML='';
    panels.innerHTML='<div class="soon"><div class="ic">🚧</div><h3>Hazırlanıyor</h3><p>Bu konu için içerik yakında eklenecektir.</p></div>';
    return;
  }
  const td=[{id:'ozet',label:'📚 Konu Özeti'},{id:'t1',label:'Test 1'},{id:'t2',label:'Test 2'},{id:'t3',label:'Test 3'},{id:'t4',label:'Test 4'},{id:'t5',label:'Test 5'}];
  tabs.innerHTML=td.map((t,i)=>`<button class="vtab${i===0?' on':''}" data-vid="${t.id}">${t.label}</button>`).join('');
  panels.innerHTML=td.map((t,i)=>`<div class="vp${i===0?' on':''}" id="vp-${t.id}"></div>`).join('');
  tabs.querySelectorAll('.vtab').forEach(btn=>{
    btn.onclick=()=>{
      tabs.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
      panels.querySelectorAll('.vp').forEach(p=>p.classList.remove('on'));
      btn.classList.add('on');
      $id('vp-'+btn.dataset.vid).classList.add('on');
    };
  });
  // Render özet
  $id('vp-ozet').innerHTML=con.summary.map(s=>`
    <div class="acc" onclick="this.classList.toggle('op')">
      <div class="ach"><div><span class="acn">${s.num}</span><h3>${s.title}</h3></div><span class="acaw">▾</span></div>
      <div class="acb">${s.body}</div>
    </div>`).join('');
  // Render tests
  ['t1','t2','t3','t4','t5'].forEach(tid=>renderTest(tid,cT.code));
}

function renderTest(tid,tc){

    <h3 style="font-family:'Playfair Display',serif;font-size:1.5rem">Test ${tid.replace('t','')}</h3>

  <div class="pg"><div class="pgf" id="pg-${key}" style="width:0%"></div></div>
  <div id="qs-${key}">`;
  qs.forEach((q,i)=>{
    h+=`<div class="qcard">
      <div class="qn">Soru ${i+1} / ${qs.length}</div>
      <div class="qt">${q.q}</div>
      <div class="opts" id="op-${key}-${i}">
        ${q.o.map((o,j)=>`<div class="opt" data-qi="${i}" data-j="${j}" data-key="${key}" data-tc="${tc}" data-tid="${tid}">
          <span class="optl">${['A','B','C','D'][j]})</span><span>${o.replace(/^[A-D]\)\s*/,'')}</span>
        </div>`).join('')}
      </div>
      <div class="ep" id="ep-${key}-${i}">${q.e}</div>
    </div>`;
  });
  h+=`</div><div class="rsc" id="rs-${key}">
    <div class="rc"><div class="rb" id="rb-${key}">0/20</div><div class="rs">puan</div></div>
    <div class="rmsg" id="rm-${key}"></div>
    <div class="rsub" id="rsub-${key}"></div>
    <button class="btn" data-key="${key}" data-tc="${tc}" data-tid="${tid}">Tekrar Çöz</button>
  </div>`;
  panel.innerHTML=h;
  // Attach events
  panel.querySelectorAll('.opt').forEach(opt=>{
    opt.onclick=()=>{
      const {qi,j,key,tc,tid}=opt.dataset;
      doAns(key,parseInt(qi),parseInt(j),tc,tid);
    };
  });
  panel.querySelector('.btn').onclick=function(){
    const {key,tc,tid}=this.dataset;
    const st=TS[key];
    gT-=st.ans;gC-=st.cor;updGS();
    renderTest(tid,tc);
  };
}

function doAns(key,qi,chosen,tc,tid){
  const qs=C[tc].tests[tid];
  const q=qs[qi];
  const opts=document.querySelectorAll(`#op-${key}-${qi} .opt`);
  if(opts[0].classList.contains('dis')) return;
  opts.forEach((o,j)=>{
    o.classList.add('dis');
    if(j===chosen) o.classList.add(chosen===q.a?'ok':'no');
    if(j===q.a && chosen!==q.a) o.classList.add('ok');
  });
  document.getElementById('ep-'+key+'-'+qi).classList.add('on');
  const st=TS[key];
  st.ans++;
  const ok=chosen===q.a;
  if(ok) st.cor++;
  gT++;if(ok)gC++;updGS();
  document.getElementById('pg-'+key).style.width=(st.ans/qs.length*100)+'%';
  if(st.ans===qs.length && !st.done){
    st.done=true;
    setTimeout(()=>showResult(key),600);
  }
}

function showResult(key){
  document.getElementById('qs-'+key).style.display='none';
  const sc=TS[key].cor;
  const pct=Math.round(sc/20*100);
  document.getElementById('rb-'+key).textContent=sc+'/20';
  const msg=pct>=85?'Mükemmel! 🏆':pct>=70?'İyi iş! 👍':pct>=50?'Geliştirilebilir 📚':'Daha fazla çalışma gerekli 💪';
  document.getElementById('rm-'+key).textContent=msg;
  document.getElementById('rsub-'+key).textContent='%'+pct+' başarı';
  document.getElementById('rs-'+key).classList.add('on');
}

renderHome();
</script>
</body>
